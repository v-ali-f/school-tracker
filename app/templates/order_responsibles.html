{% extends "layout.html" %}
{% block content %}
<h2 class="mb-3">Ответственные за реестр приказов</h2>
<div class="card"><div class="card-body">
<form method="post">
  <div class="row g-3">
    {% for code, label in sections %}
      <div class="col-md-6">
        <label class="form-label">{{ label }}</label>
        <select class="form-select" name="user_id_{{ code }}">
          <option value="">Не назначен</option>
          {% for u in users %}
            <option value="{{ u.id }}" {% if mapping.get(code) == u.id %}selected{% endif %}>{{ u.fio or u.username }}</option>
          {% endfor %}
        </select>
      </div>
    {% endfor %}
  </div>
  <div class="mt-3 d-flex gap-2">
    <button class="btn btn-primary">Сохранить</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('orders.registry') }}">К реестру</a>
  </div>
</form>
</div></div>
{% endblock %}
