{% extends "layout.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h3 class="mb-0">Импорт родителей</h3>
    <div class="text-muted">Загрузка представителей и привязка к уже существующим детям</div>
  </div>
  <a class="btn btn-outline-secondary" href="{{ url_for('children.list_children') }}">Назад</a>
</div>

<div class="card">
  <div class="card-body">
    <form method="post" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label">Excel-файл родителей</label>
        <input type="file" name="file" class="form-control" accept=".xlsx,.xls" required>
      </div>

      <div class="alert alert-light border">
        <div><b>Обязательные колонки:</b></div>
        <div class="small mt-2">
          ФИО, Дата рождения, Тип представителя, ФИО представителя, Телефон представителя, E-mail представителя
        </div>
      </div>

      <button class="btn btn-primary">Загрузить</button>
    </form>
  </div>
</div>

{% endblock %}
