{% extends "layout.html" %}
{% block content %}
<h4 class="mb-3">Импорт пользователей из Excel</h4>

<div class="card">
  <div class="card-body">
    <form method="post" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label">Excel файл</label>
        <input class="form-control" type="file" name="file" accept=".xlsx" required>
      </div>
      <button class="btn btn-primary">Загрузить</button>
      <a class="btn btn-outline-secondary" href="/admin/users">Назад</a>
    </form>

    <hr>
    <div class="text-muted">
      Колонки: username, password, role, last_name, first_name, phone
    </div>
  </div>
</div>
{% endblock %}
