{% extends "layout.html" %}
{% block content %}

<div class="d-flex align-items-center justify-content-between mb-3">
  <div>
    <h4 class="mb-0">Новый инцидент</h4>
    <div class="text-muted" style="font-size:0.95em;">Выбор: параллель → класс → ученик (можно несколько)</div>
  </div>
  <a class="btn btn-outline-secondary" href="{{ url_for('children.home') }}">На главную</a>
</div>

<div class="card">
  <div class="card-body">
    <form method="post" id="incidentForm">

      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Дата</label>
          <input class="form-control" type="date" name="occurred_date" required>
        </div>

      <div class="col-md-3">
  <label class="form-label">Время</label>
  <div class="d-flex gap-2">
    <select class="form-select" name="occurred_hour" required>
      {% for h in range(0,24) %}
        <option value="{{ "%02d"|format(h) }}">{{ "%02d"|format(h) }}</option>
      {% endfor %}
    </select>

    <select class="form-select" name="occurred_minute" required>
      {% for m in range(0,60,5) %}
        <option value="{{ "%02d"|format(m) }}">{{ "%02d"|format(m) }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="form-text text-muted">Минуты с шагом 5</div>
</div>

        <div class="col-md-6">
          <label class="form-label">Категория</label>
          <select class="form-select" name="category" required>
            <option value="">— выбрать —</option>
            {% for c in categories %}
              <option value="{{ c }}">{{ c }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <hr class="my-3">

      <label class="form-label mb-1">Участники (дети)</label>
      <div id="participants"></div>

      <button type="button" class="btn btn-outline-primary btn-sm mt-2" id="addParticipantBtn">
        + Добавить ученика
      </button>

      <div class="mt-3">
        <label class="form-label">Описание</label>
        <textarea class="form-control" name="description" rows="4" placeholder="Кратко опиши ситуацию"></textarea>
      </div>

      <div class="d-flex gap-2 mt-3">
        <button class="btn btn-primary">Сохранить</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('children.home') }}">Отмена</a>
      </div>

    </form>
  </div>
</div>

<script>
let idx = 0;

function participantBlock(i) {
  const grades = Array.from({length: 11}, (_,k)=>k+1)
    .map(n=>`<option value="${n}">${n}</option>`)
    .join("");

  return `
  <div class="border rounded p-2 mb-2" data-i="${i}">
    <div class="row g-2 align-items-end">
      <div class="col-md-2">
        <label class="form-label">Параллель</label>
        <select class="form-select gradeSel" required>
          <option value="">—</option>
          ${grades}
        </select>
      </div>

      <div class="col-md-3">
        <label class="form-label">Класс</label>
        <select class="form-select classSel" disabled required>
          <option value="">—</option>
        </select>
      </div>

     <div class="col-md-6">
  <label class="form-label">Ученик(и)</label>

  <!-- name="child_ids" остаётся таким же -->
  <select class="form-select childSel" name="child_ids" multiple size="10" disabled required>
    <option value="">—</option>
  </select>

  <div class="form-text text-muted">
    Можно выбрать несколько: Ctrl/⌘ + клик (или Shift для диапазона)
  </div>
</div>

      <div class="col-md-1 text-end">
        <button type="button" class="btn btn-outline-danger btn-sm removeBtn" title="Убрать">×</button>
      </div>
    </div>
  </div>`;
}

function setLoading(selectEl, text){
  selectEl.innerHTML = `<option value="">${text || "Загрузка..."}</option>`;
  selectEl.disabled = true;
}

async function loadClasses(grade, classSelect) {
  classSelect.innerHTML = `<option value="">—</option>`;
  classSelect.disabled = true;

  if (!grade) return;

  try{
    setLoading(classSelect, "Загрузка классов...");
    const res = await fetch(`/api/classes/by-grade?grade=${encodeURIComponent(grade)}`);
    const data = await res.json();

    classSelect.innerHTML = `<option value="">— выбрать —</option>`;
    data.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.id;
      opt.textContent = c.name;
      classSelect.appendChild(opt);
    });
    classSelect.disabled = false;
  }catch(e){
    classSelect.innerHTML = `<option value="">Ошибка загрузки</option>`;
    classSelect.disabled = true;
    alert("Не удалось загрузить классы. Проверь /api/classes/by-grade");
  }
}

async function loadChildren(classId, childSelect) {
  childSelect.innerHTML = "";
  childSelect.disabled = true;

  if (!classId) return;

  const res = await fetch(`/api/children/by-class?class_id=${encodeURIComponent(classId)}`);
  const data = await res.json();

  data.forEach(ch => {
    const opt = document.createElement("option");
    opt.value = ch.id;
    opt.textContent = ch.fio;
    childSelect.appendChild(opt);
  });

  childSelect.disabled = false;
}

function addParticipant() {
  const container = document.getElementById("participants");
  container.insertAdjacentHTML("beforeend", participantBlock(idx));

  const block = container.querySelector(`[data-i="${idx}"]`);
  const gradeSel = block.querySelector(".gradeSel");
  const classSel = block.querySelector(".classSel");
  const childSel = block.querySelector(".childSel");

gradeSel.addEventListener("change", async () => {
  childSel.innerHTML = "";
  childSel.disabled = true;
  await loadClasses(gradeSel.value, classSel);
});

  classSel.addEventListener("change", async () => {
    childSel.innerHTML = `<option value="">—</option>`;
    childSel.disabled = true;
    await loadChildren(classSel.value, childSel);
  });

  block.querySelector(".removeBtn").addEventListener("click", () => {
    block.remove();
  });

  idx += 1;
}

document.getElementById("addParticipantBtn").addEventListener("click", addParticipant);

// первый блок сразу
addParticipant();

// защита: если кто-то оставил "— выбрать —" и нажал сохранить
document.getElementById("incidentForm").addEventListener("submit", (e) => {
  const selects = Array.from(document.querySelectorAll('select[name="child_ids"]'));
  const chosen = selects.flatMap(s => Array.from(s.selectedOptions).map(o => o.value)).filter(v => v && v !== "");
  if (chosen.length === 0){
    e.preventDefault();
    alert("Выберите хотя бы одного ребёнка.");
    return;
  }
});
</script>
<script>
(function(){
  const sel = document.getElementById("timePicker5");
  const hidden = document.getElementById("occurred_time");

  if (!sel || !hidden) return;

  function pad(n){ return String(n).padStart(2, "0"); }

  // генерим 00:00..23:55 с шагом 5 минут
  for (let h = 0; h < 24; h++) {
    for (let m = 0; m < 60; m += 5) {
      const v = `${pad(h)}:${pad(m)}`;
      const opt = document.createElement("option");
      opt.value = v;
      opt.textContent = v;
      sel.appendChild(opt);
    }
  }

  // по умолчанию — ближайшие 5 минут (округление вверх)
  const now = new Date();
  let hh = now.getHours();
  let mm = now.getMinutes();
  mm = Math.ceil(mm / 5) * 5;
  if (mm === 60) { mm = 0; hh = (hh + 1) % 24; }
  const def = `${pad(hh)}:${pad(mm)}`;
  sel.value = def;
  hidden.value = def;

  sel.addEventListener("change", () => {
    hidden.value = sel.value || "";
  });
})();
const hourSel = document.getElementById("hourSelect");
const minSel = document.getElementById("minuteSelect");
const hiddenTime = document.getElementById("occurred_time");

function pad(n){
  return String(n).padStart(2,"0");
}

// часы
for(let h=0; h<24; h++){
  const opt=document.createElement("option");
  opt.value=pad(h);
  opt.textContent=pad(h);
  hourSel.appendChild(opt);
}

// минуты (шаг 5)
for(let m=0; m<60; m+=5){
  const opt=document.createElement("option");
  opt.value=pad(m);
  opt.textContent=pad(m);
  minSel.appendChild(opt);
}

function updateTime(){
  if(hourSel.value && minSel.value){
    hiddenTime.value = `${hourSel.value}:${minSel.value}`;
  }
}

hourSel.addEventListener("change", updateTime);
minSel.addEventListener("change", updateTime);

// автоматически поставить текущее время
const now = new Date();
let h = pad(now.getHours());
let m = Math.round(now.getMinutes()/5)*5;
if(m==60){m=0}
m = pad(m);

hourSel.value = h;
minSel.value = m;
hiddenTime.value = `${h}:${m}`;

</script>

{% endblock %}
