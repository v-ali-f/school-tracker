{# Ожидаем переменные: child, documents #}

{% set page = request.path %}
{% if "children" in page %}
  {# определяем тип блока по тому, где включили #}
{% endif %}

<ul class="list-group mb-3">
  {% for d in documents %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
      <span>{{ d.title or d.filename }}</span>
      <span class="badge bg-secondary">{{ d.doc_type }}</span>
    </li>
  {% else %}
    <li class="list-group-item text-muted">Документов пока нет</li>
  {% endfor %}
</ul>
