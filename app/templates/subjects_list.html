{% extends "layout.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <h3 class="mb-0">Реестр предметов</h3>
    <div class="text-muted">Справочник предметов для академической задолженности</div>
  </div>

  <div class="d-flex gap-2">
    <a class="btn btn-outline-primary" href="{{ url_for('children.subjects_import') }}">
      Импорт Excel
    </a>

    <a class="btn btn-outline-secondary" href="{{ url_for('main.dashboard') }}">
      На главную
    </a>
  </div>
</div>

<div class="card mb-3">
  <div class="card-body">
    <form method="get" class="row g-2">
      <div class="col-md-9">
        <input class="form-control" name="q" value="{{ q or '' }}" placeholder="Поиск предмета">
      </div>
      <div class="col-md-3 d-grid">
        <button class="btn btn-outline-primary">Найти</button>
      </div>
    </form>
  </div>
</div>

<div class="card mb-3">
  <div class="card-body">
    <form method="post" action="{{ url_for('children.subjects_new') }}" class="row g-2">
      <div class="col-md-9">
        <input class="form-control" name="name" placeholder="Название предмета" required>
      </div>
      <div class="col-md-3 d-grid">
        <button class="btn btn-primary">Добавить предмет</button>
      </div>
    </form>
  </div>
</div>

<div class="card">
  <div class="table-responsive">
    <table class="table table-striped align-middle mb-0">
      <thead>
        <tr>
          <th>Название предмета</th>
          <th style="width:260px;" class="text-end">Действия</th>
        </tr>
      </thead>
      <tbody>
        {% for s in subjects %}
          <tr>
            <td>
              <form method="post" action="{{ url_for('children.subjects_update', subject_id=s.id) }}" class="d-flex gap-2">
                <input class="form-control form-control-sm" name="name" value="{{ s.name }}">
            </td>
            <td class="text-end">
                <button class="btn btn-sm btn-success" type="submit">Сохранить</button>
              </form>

              <form method="post"
                    action="{{ url_for('children.subjects_delete', subject_id=s.id) }}"
                    class="d-inline"
                    onsubmit="return confirm('Удалить предмет?');">
                <button class="btn btn-sm btn-outline-danger">Удалить</button>
              </form>
            </td>
          </tr>
        {% endfor %}

        {% if subjects|length == 0 %}
          <tr>
            <td colspan="2" class="text-muted">Предметов пока нет</td>
          </tr>
        {% endif %}
      </tbody>
    </table>
  </div>
</div>

{% endblock %}
